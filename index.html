<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>IT Global - Управление Global ID</title>
    <link rel="icon" href="https://i.ibb.co/Y7j6w8KP/bfbf965f-9bf0-44a5-bfdf-6d695106a6e0.webp">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Y7j6w8KP/bfbf965f-9bf0-44a5-bfdf-6d695106a6e0.webp">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A0F1E">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #001a00, #003300);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(0, 34, 0, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #00aa00;
            box-shadow: 0 10px 40px rgba(0, 255, 0, 0.1);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff00, #00aa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .subtitle { text-align: center; color: #00cc00; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: #00cc00; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #00aa00;
            border-radius: 12px;
            background: rgba(0, 20, 0, 0.7);
            color: #00ff00;
        }
        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, #00aa00, #00ff00); color: #001a00; }
        .btn-secondary { background: transparent; color: #00ff00; border: 1px solid #00aa00; }
        .btn-danger { background: #aa3333; color: white; }
        .global-id-box {
            background: rgba(0, 30, 0, 0.5);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            border: 2px solid #00ff00;
        }
        .global-id-value {
            font-size: 20px;
            font-family: monospace;
            background: #001a00;
            padding: 12px;
            border-radius: 12px;
            color: #00ff00;
        }
        .qr-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 16px;
        }
        .two-factor-code {
            background: #000800;
            border: 3px solid #00ff00;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.6); }
            100% { box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
        }
        .code-display {
            font-size: 64px;
            font-weight: bold;
            letter-spacing: 20px;
            color: #00ff00;
            font-family: monospace;
        }
        .warning-box {
            background: rgba(255, 152, 0, 0.1);
            border: 1px solid #ff9800;
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            color: #ff9800;
            font-size: 12px;
        }
        .message {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
            border-radius: 8px;
            display: none;
        }
        .message-success { background: rgba(0, 80, 0, 0.5); color: #00ff00; display: block; }
        .message-error { background: rgba(80, 0, 0, 0.5); color: #ff6666; display: block; }
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00aa00, #00ff00);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            color: #001a00;
        }
        .section-title { font-size: 18px; color: #00ff00; margin-bottom: 16px; border-bottom: 1px solid #00aa00; padding-bottom: 8px; }
        .flex-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .flex-buttons button { flex: 1; }
        .info-text { color: #00aa00; font-size: 12px; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ВХОД -->
        <div id="authForm" class="card">
            <div class="avatar">🌐</div>
            <h1>Global ID</h1>
            <div class="subtitle">Управление единым идентификатором</div>
            
            <div id="loginMode">
                <div class="form-group">
                    <label class="form-label">Email или Global ID</label>
                    <input type="text" id="loginIdentifier" placeholder="your@email.com или Global ID">
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль">
                </div>
                <button class="btn btn-primary" onclick="login()">Войти</button>
                <button class="btn btn-secondary" onclick="showRegister()" style="margin-top: 10px;">Создать Global ID</button>
            </div>

            <div id="registerMode" style="display:none;">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль (минимум 6 символов)</label>
                    <input type="password" id="regPassword" placeholder="Введите пароль">
                </div>
                <button class="btn btn-primary" onclick="register()">Создать Global ID</button>
                <button class="btn btn-secondary" onclick="showLogin()" style="margin-top: 10px;">Назад</button>
            </div>

            <div id="authMessage" class="message"></div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="profilePanel" style="display:none;">
            <!-- 2FA КОДЫ -->
            <div class="card">
                <div class="avatar">🔐</div>
                <h1>Аутентификатор</h1>
                <div class="subtitle">Коды для входа в сервисы</div>
                
                <div id="twoFactorSection">
                    <div class="two-factor-code" id="codeBlock" style="display: none;">
                        <div style="font-size: 12px; color: #00aa00;">ТЕКУЩИЙ КОД</div>
                        <div class="code-display" id="currentCode">----</div>
                        <div id="codeTimer" style="color: #ffaa00; margin-top: 10px;">5:00</div>
                    </div>
                    
                    <div id="noCodeMessage" style="text-align: center; padding: 30px; color: #00aa00;">
                        <div style="font-size: 40px;">🛡️</div>
                        <p>Коды 2FA появятся здесь при входе в сервисы</p>
                    </div>
                    
                    <div class="warning-box">
                        <strong>⚠️ ВНИМАНИЕ!</strong><br>
                        Никогда не сообщайте этот код никому!
                    </div>
                </div>
            </div>

            <!-- ПРОФИЛЬ -->
            <div class="card">
                <div class="avatar" id="userAvatar">👤</div>
                <h1 id="userName"></h1>
                <div class="subtitle" id="userEmail"></div>
                
                <div class="global-id-box">
                    <div style="font-size: 12px; color: #00aa00;">🔑 Ваш Global ID</div>
                    <div class="global-id-value" id="globalIdValue"></div>
                    <button class="btn btn-secondary" onclick="copyGlobalId()" style="margin-top: 10px;">📋 Копировать</button>
                </div>

                <div class="qr-container" id="qrContainer"></div>
                <div class="info-text">Отсканируйте QR-код, чтобы поделиться Global ID</div>
            </div>

            <!-- КНОПКИ -->
            <div class="card">
                <div class="flex-buttons">
                    <button class="btn btn-danger" onclick="logout()">🚪 Выйти</button>
                </div>
                <div id="profileMessage" class="message"></div>
            </div>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyA6GGJxAiao77U7_9mBUEjftmS_FnSWbIw",
            authDomain: "glob-data.firebaseapp.com",
            projectId: "glob-data",
            storageBucket: "glob-data.firebasestorage.app",
            messagingSenderId: "122757049174",
            appId: "1:122757049174:web:ebb425edd0e1a8ea9a44f7"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();

        let currentUserData = null;
        let codeInterval = null;

        function generateGlobalId() {
            const chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            return Array.from({length: 22}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        function showMessage(element, text, isError = true) {
            element.textContent = text;
            element.className = `message ${isError ? 'message-error' : 'message-success'}`;
            setTimeout(() => element.style.display = 'none', 3000);
        }

        function generateQR(globalId) {
            document.getElementById('qrContainer').innerHTML = '';
            new QRCode(document.getElementById('qrContainer'), {
                text: `Global ID: ${globalId}`,
                width: 200, height: 200,
                colorDark: "#00aa00", colorLight: "#ffffff"
            });
        }

        function display2FACode(code, expires) {
            const codeBlock = document.getElementById('codeBlock');
            const noCodeMessage = document.getElementById('noCodeMessage');
            const currentCode = document.getElementById('currentCode');
            const codeTimer = document.getElementById('codeTimer');
            
            codeBlock.style.display = 'block';
            noCodeMessage.style.display = 'none';
            currentCode.textContent = code;
            
            if (codeInterval) clearInterval(codeInterval);
            
            codeInterval = setInterval(() => {
                const diff = expires.toDate() - new Date();
                if (diff <= 0) {
                    clearInterval(codeInterval);
                    currentCode.textContent = 'ИСТЁК';
                    codeTimer.textContent = 'Код истёк';
                    setTimeout(() => {
                        codeBlock.style.display = 'none';
                        noCodeMessage.style.display = 'block';
                    }, 5000);
                } else {
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    codeTimer.textContent = `${m}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function watchFor2FACodes(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                const data = doc.data();
                if (data?.twoFactorCode && data.twoFactorCodeExpires?.toDate() > new Date()) {
                    display2FACode(data.twoFactorCode, data.twoFactorCodeExpires);
                }
            });
        }

        window.copyGlobalId = () => {
            const gid = document.getElementById('globalIdValue').innerText;
            if (gid && gid !== '—') {
                navigator.clipboard.writeText(gid);
                showMessage(document.getElementById('profileMessage'), '✅ Global ID скопирован!', false);
            }
        };

        window.login = async () => {
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('authMessage');
            
            if (!identifier || !password) {
                showMessage(msgDiv, 'Заполните все поля', true);
                return;
            }
            
            try {
                let email = identifier;
                if (!identifier.includes('@')) {
                    const q = query(collection(db, "users"), where("globalId", "==", identifier));
                    const snap = await getDocs(q);
                    if (snap.empty) { showMessage(msgDiv, 'Global ID не найден', true); return; }
                    email = snap.docs[0].data().email;
                }
                
                await signInWithEmailAndPassword(auth, email, password);
                
                // Даём доступ к Global ID
                const user = auth.currentUser;
                await updateDoc(doc(db, "users", user.uid), {
                    globalIdAccess: true,
                    globalIdLastLogin: new Date()
                });
            } catch (error) {
                showMessage(msgDiv, 'Неверные данные', true);
            }
        };

        window.register = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const msgDiv = document.getElementById('authMessage');
            
            if (!email || !password) { showMessage(msgDiv, 'Заполните все поля', true); return; }
            if (password.length < 6) { showMessage(msgDiv, 'Пароль минимум 6 символов', true); return; }
            
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const globalId = generateGlobalId();
                
                await setDoc(doc(db, "users", userCred.user.uid), {
                    email, globalId,
                    createdAt: new Date(),
                    globalIdAccess: true,
                    icebergAccess: false // Айсберг потребует отдельный вход
                });
                
                showMessage(msgDiv, '✅ Global ID создан!', false);
                setTimeout(() => showLogin(), 1500);
            } catch (error) {
                showMessage(msgDiv, error.message, true);
            }
        };

        window.logout = async () => {
            if (codeInterval) clearInterval(codeInterval);
            await signOut(auth);
        };

        window.showRegister = () => {
            document.getElementById('loginMode').style.display = 'none';
            document.getElementById('registerMode').style.display = 'block';
        };
        
        window.showLogin = () => {
            document.getElementById('loginMode').style.display = 'block';
            document.getElementById('registerMode').style.display = 'none';
        };

        async function loadProfile() {
            const user = auth.currentUser;
            if (!user) return;
            
            const userDoc = await getDoc(doc(db, "users", user.uid));
            currentUserData = userDoc.data();
            
            if (!currentUserData) {
                const globalId = generateGlobalId();
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email, globalId,
                    createdAt: new Date(),
                    globalIdAccess: true,
                    icebergAccess: false
                });
                currentUserData = { globalId, email: user.email };
            }
            
            document.getElementById('userName').innerText = currentUserData.fullName || user.email.split('@')[0];
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('userAvatar').innerText = (currentUserData.fullName || user.email).charAt(0).toUpperCase();
            document.getElementById('globalIdValue').innerText = currentUserData.globalId || '—';
            
            if (currentUserData.globalId) generateQR(currentUserData.globalId);
            
            watchFor2FACodes(user.uid);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authForm').style.display = 'none';
                document.getElementById('profilePanel').style.display = 'block';
                await loadProfile();
            } else {
                if (codeInterval) clearInterval(codeInterval);
                document.getElementById('authForm').style.display = 'block';
                document.getElementById('profilePanel').style.display = 'none';
                document.getElementById('codeBlock').style.display = 'none';
                document.getElementById('noCodeMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
